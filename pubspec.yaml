name: jejak_faa_new
description: A new Flutter project
publish_to: 'none'

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^16.3.0

  # Supabase
  supabase_flutter: ^2.10.3

  # HTTP & Network
  http: ^1.2.2
  connectivity_plus: ^7.0.0

  # Map & Geolocation
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2

  # Local Database (ganti ISAR → DRIFT)
  drift: ^2.20.1
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  flutter_dotenv: ^6.0.0
  logger: ^2.6.2
  exif: ^3.3.0
  google_sign_in: ^7.2.0
  equatable: ^2.0.5
  riverpod_annotation: ^2.3.5
  image_picker: ^1.2.0
  photo_view: ^0.15.0
  geolocator_apple: ^2.3.13
  geolocator_android: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation tools
  build_runner: ^2.4.9
  drift_dev: ^2.20.1
  json_serializable: ^6.8.0
  copy_with_extension_gen: ^6.0.1
  riverpod_generator: ^2.3.5

flutter:
  uses-material-design: true

  assets:
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
